<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaperLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Nunito+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ─── Design Tokens ─────────────────────────────────────────────── */
    :root {
      --bg: #FBF8F3;
      --bg-2: #F4EFE7;
      --card: #FFFFFF;
      --text: #2D2A26;
      --text-2: #6E685E;
      --text-3: #A9A299;
      --accent: #8B5E3C;
      --accent-light: #F5EDE5;
      --blue: #3B6FA0;
      --green: #4A7C59;
      --red: #A0523B;
      --purple: #6B5B95;
      --border: #E4DED4;
      --amber-bg: #FFF8ED;
      --amber-border: #FDE68A;
      --before-bg: #FEF2F2;
      --after-bg: #E8F5E9;

      --font-serif: 'Libre Baskerville', Georgia, serif;
      --font-body: 'Nunito Sans', system-ui, sans-serif;
      --font-mono: 'Fira Code', 'Courier New', monospace;

      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --radius: 8px;
    }

    /* ─── Reset & Base ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ─── Navbar ────────────────────────────────────────────────────── */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1rem;
    }

    .navbar-back {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
    }
    .navbar-back:hover { text-decoration: underline; }

    /* ─── Navbar Search ─────────────────────────────────────────────── */
    .navbar-search {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 340px;
    }
    .navbar-search input {
      width: 100%;
      padding: 0.3125rem 0.875rem 0.3125rem 2.125rem;
      font-family: var(--font-body);
      font-size: 0.8125rem;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s;
    }
    .navbar-search input:focus { border-color: var(--accent); background: var(--card); }
    .navbar-search input::placeholder { color: var(--text-3); }
    .navbar-search-icon {
      position: absolute;
      left: 0.625rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      pointer-events: none;
    }
    .search-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      overflow: hidden;
      z-index: 200;
      max-height: 320px;
      overflow-y: auto;
    }
    .search-dropdown.open { display: block; }
    .search-dropdown-item {
      display: flex;
      flex-direction: column;
      padding: 0.625rem 0.875rem;
      text-decoration: none;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .search-dropdown-item:last-child { border-bottom: none; }
    .search-dropdown-item:hover,
    .search-dropdown-item.focused { background: var(--accent-light); }
    .search-dropdown-title {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .search-dropdown-meta {
      font-size: 0.6875rem;
      color: var(--text-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .search-dropdown-empty {
      padding: 0.875rem;
      font-size: 0.8125rem;
      color: var(--text-3);
      text-align: center;
    }

    .navbar-logo {
      font-family: var(--font-body);
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }
    .navbar-logo strong { color: var(--accent); font-weight: 700; }
    .navbar-logo:hover { text-decoration: none; }


    /* ─── Layout ────────────────────────────────────────────────────── */
    .layout {
      display: flex;
      min-height: calc(100vh - 44px);
    }

    /* ─── Sidebar ───────────────────────────────────────────────────── */
    .sidebar {
      width: 230px;
      flex-shrink: 0;
      position: sticky;
      top: 44px;
      height: calc(100vh - 44px);
      overflow-y: auto;
      padding: 1.5rem 1rem;
      border-right: 1px solid var(--border);
      background: var(--bg);
    }

    .sidebar-label {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 0.75rem;
      padding: 0 0.5rem;
    }

    .chapter-nav {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .chapter-nav-item a {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.4375rem 0.5rem;
      border-radius: 6px;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-2);
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }
    .chapter-nav-item a:hover {
      background: var(--accent-light);
      color: var(--accent);
      text-decoration: none;
    }
    .chapter-nav-item.active a {
      background: var(--accent-light);
      color: var(--accent);
    }

    .chapter-num {
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--text-3);
      min-width: 1.75rem;
    }
    .chapter-nav-item.active .chapter-num {
      color: var(--accent);
    }

    .progress-section {
      margin-top: 1.5rem;
      padding: 0 0.5rem;
    }

    .progress-bar-track {
      height: 4px;
      background: var(--border);
      border-radius: 9999px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 9999px;
      transition: width 0.3s ease;
      width: 0%;
    }
    .progress-label {
      font-size: 0.75rem;
      color: var(--text-3);
    }

    /* ─── Main Content ──────────────────────────────────────────────── */
    .main {
      flex: 1;
      min-width: 0;
      padding: 2rem 2.5rem 4rem;
    }

    .content-inner {
      max-width: 780px;
      margin: 0 auto;
    }

    /* ─── Paper Header ──────────────────────────────────────────────── */
    .paper-header {
      padding-bottom: 1.75rem;
      margin-bottom: 2.5rem;
      border-bottom: 2px solid var(--accent);
    }

    .paper-title {
      font-family: var(--font-serif);
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1.25;
      color: var(--text);
      margin-bottom: 0.875rem;
    }

    .paper-authors {
      font-size: 0.875rem;
      color: var(--text-2);
      margin-bottom: 0.75rem;
    }
    .paper-meta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
    }
    .paper-meta-item {
      font-size: 0.875rem;
      color: var(--text-2);
    }
    .paper-tag {
      font-family: var(--font-body);
      font-size: 0.6875rem;
      font-weight: 600;
      padding: 0.1875rem 0.5rem;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 9999px;
      color: var(--text-2);
    }

    .read-original-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.25rem 0.75rem;
      background: var(--accent);
      color: #fff;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
      margin-left: auto;
    }
    .read-original-btn:hover {
      opacity: 0.88;
      text-decoration: none;
      color: #fff;
    }

    /* ─── Section Wrapper ───────────────────────────────────────────── */
    .paper-section {
      margin-bottom: 3.5rem;
      scroll-margin-top: 60px;
    }

    .section-heading {
      font-family: var(--font-serif);
      font-size: 1.875rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1.5rem;
    }

    .sec-num {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-3);
      margin-right: 0.5rem;
      letter-spacing: 0.04em;
    }

    /* ─── Summary Callout ───────────────────────────────────────────── */
    .summary-callout {
      border-left: 4px solid var(--accent);
      background: var(--accent-light);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 1.25rem 1.375rem;
    }
    .summary-callout-label {
      font-size: 0.8125rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.625rem;
    }
    .summary-callout p {
      font-size: 1rem;
      line-height: 1.75;
      color: var(--text);
    }

    /* ─── Background Section ───────────────────────────────────────────── */
    .bg-field-strip {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8125rem;
      color: var(--text-2);
      margin-bottom: 1.5rem;
      padding: 0.5rem 0.75rem;
      background: var(--bg-2);
      border-radius: var(--radius);
    }
    .bg-field-label {
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-right: 0.25rem;
    }

    .bg-narrative {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      margin-bottom: 1.25rem;
    }
    .bg-item {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 0.75rem 1.25rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .bg-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .bg-item-label {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-3);
      padding-top: 0.2rem;
      line-height: 1.4;
    }
    .bg-item-text {
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--text);
    }

    /* ─── Did You Know Callout ──────────────────────────────────────── */
    .dyk-callout {
      border-left: 4px solid var(--purple);
      background: #F0EDFA;
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 1rem 1.25rem;
    }
    .dyk-callout-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--purple);
      margin-bottom: 0.375rem;
    }
    .dyk-callout p {
      font-size: 0.9rem;
      line-height: 1.65;
      color: var(--text);
    }

    /* ─── Abstract Decoded ──────────────────────────────────────────── */
    .abstract-quote {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1rem;
      line-height: 1.85;
      background: var(--amber-bg);
      border-left: 4px solid var(--accent);
      padding: 1.25rem 1.5rem;
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--text);
      margin-bottom: 1.75rem;
    }

    .decode-label {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 0.875rem;
    }

    .decode-grid {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .decode-item {
      display: grid;
      grid-template-columns: 2fr 1fr 3fr;
      align-items: center;
      gap: 0;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--amber-border);
    }
    .decode-phrase {
      background: var(--amber-bg);
      padding: 0.625rem 1rem;
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
    }
    .decode-arrow {
      background: var(--amber-bg);
      color: var(--accent);
      font-size: 0.875rem;
      text-align: center;
      padding: 0.625rem 0;
      opacity: 0.6;
      border-right: 1px solid var(--amber-border);
    }
    .decode-meaning {
      background: var(--card);
      padding: 0.625rem 1rem;
      font-size: 0.875rem;
      line-height: 1.6;
      color: var(--text-2);
    }

    /* ─── Real-World Impact ─────────────────────────────────────────── */
    .impact-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .impact-col-header {
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4375rem 0.75rem;
      border-radius: var(--radius) var(--radius) 0 0;
      margin-bottom: 0.625rem;
    }
    .impact-col-header.before {
      background: #FECACA;
      color: var(--red);
    }
    .impact-col-header.after {
      background: #BBF7D0;
      color: var(--green);
    }

    .impact-col {
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }

    .impact-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .impact-card.before-card {
      background: var(--before-bg);
      border-color: #FECACA;
    }
    .impact-card.after-card {
      background: var(--after-bg);
      border-color: #BBF7D0;
    }
    .impact-card-body {
      padding: 0.875rem 1rem;
    }
    .impact-area {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 0.375rem;
    }
    .before-card .impact-area { color: var(--red); }
    .after-card .impact-area { color: var(--green); }
    .impact-desc {
      font-size: 0.875rem;
      line-height: 1.65;
      color: var(--text);
    }
    .impact-example {
      font-style: italic;
      font-size: 0.8125rem;
      color: var(--text-2);
      margin-top: 0.5rem;
      padding-left: 0.75rem;
      border-left: 2px solid var(--border);
    }

    .key-insight-callout {
      border-left: 4px solid var(--blue);
      background: #EBF4FF;
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 1rem 1.25rem;
    }
    .key-insight-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 0.375rem;
    }
    .key-insight-callout p {
      font-size: 0.9rem;
      line-height: 1.65;
      color: var(--text);
    }

    /* ─── Breakdown ─────────────────────────────────────────────────── */
    .breakdown-list {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .breakdown-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.125rem 1.25rem;
      box-shadow: var(--shadow-sm);
    }
    .breakdown-num {
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 0.3125rem;
    }
    .breakdown-title {
      font-family: var(--font-serif);
      font-size: 1.0625rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .breakdown-text {
      font-size: 0.9rem;
      line-height: 1.75;
      color: var(--text);
    }

    /* ─── Q&A ───────────────────────────────────────────────────────── */
    .qna-tabs {
      display: flex;
      gap: 0.375rem;
      margin-bottom: 1.25rem;
    }
    .tab-btn {
      padding: 0.375rem 1rem;
      border-radius: 9999px;
      border: 1px solid var(--border);
      background: var(--card);
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .tab-panel {
      display: none;
    }
    .tab-panel.active {
      display: block;
    }

    .accordion-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .accordion-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.15s;
    }
    .accordion-item:hover {
      border-color: var(--accent);
    }

    .accordion-trigger {
      width: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.875rem 1rem;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-family: var(--font-body);
    }
    .accordion-trigger:hover {
      background: var(--bg-2);
    }

    .accordion-q {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.45;
    }

    .accordion-arrow {
      font-size: 1rem;
      color: var(--accent);
      flex-shrink: 0;
      transition: transform 0.25s ease;
      margin-top: 2px;
      opacity: 0.6;
    }
    .accordion-item.open .accordion-arrow {
      transform: rotate(90deg);
      opacity: 1;
    }

    .accordion-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .accordion-item.open .accordion-body {
      max-height: 600px;
    }

    .accordion-answer {
      padding: 0 1rem 0.875rem;
      font-size: 0.9rem;
      line-height: 1.75;
      color: var(--text-2);
      border-top: 1px solid var(--border);
      padding-top: 0.875rem;
    }

    /* ─── References ────────────────────────────────────────────────── */
    .refs-groups {
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }

    .ref-group {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .ref-group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      cursor: pointer;
      background: var(--card);
      user-select: none;
      transition: background 0.15s;
    }
    .ref-group-header:hover {
      background: var(--bg-2);
    }

    .ref-group-left {
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }

    .ref-type-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      flex-shrink: 0;
    }

    .ref-group-name {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text);
      text-transform: capitalize;
    }

    .ref-group-count {
      font-size: 0.75rem;
      color: var(--text-3);
      margin-left: 0.25rem;
    }

    .ref-group-arrow {
      font-size: 0.75rem;
      color: var(--text-3);
      transition: transform 0.25s;
    }
    .ref-group.open .ref-group-arrow {
      transform: rotate(180deg);
    }

    .ref-group-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .ref-group.open .ref-group-body {
      max-height: 2000px;
    }

    .ref-cards {
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .ref-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
    }
    .ref-card-title {
      font-size: 0.9375rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .ref-card-title a {
      color: var(--blue);
    }
    .ref-card-title a:hover {
      text-decoration: underline;
    }
    .ref-card-meta {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      margin-bottom: 0.375rem;
    }
    .ref-level {
      font-family: var(--font-mono);
      font-size: 0.625rem;
      font-weight: 600;
      padding: 0.125rem 0.4375rem;
      border-radius: 9999px;
      letter-spacing: 0.03em;
    }
    .ref-level-beginner { background: #E8F5E9; color: #2E7D32; }
    .ref-level-intermediate { background: #FFF8E7; color: #8B5E3C; }
    .ref-level-expert { background: #F3EEFF; color: #6B5B95; }
    .ref-source {
      font-size: 0.75rem;
      color: var(--text-3);
    }
    .ref-desc {
      font-size: 0.875rem;
      line-height: 1.6;
      color: var(--text-2);
    }

/* ─── Jargon Highlighting ───────────────────────────────────────── */
    mark.jt {
      background: transparent;
      border-bottom: 2px dotted var(--accent);
      color: inherit;
      cursor: help;
      padding: 0 1px;
      border-radius: 0;
      position: relative;
    }
    mark.jt:hover {
      background: var(--accent-light);
      border-bottom-style: solid;
    }
    mark.jt:hover::after {
      content: attr(title);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem 0.75rem;
      font-family: var(--font-body);
      font-size: 0.8rem;
      line-height: 1.5;
      color: var(--text-2);
      white-space: normal;
      width: max-content;
      max-width: 300px;
      box-shadow: var(--shadow);
      z-index: 50;
      pointer-events: none;
    }

    /* ─── Error State ───────────────────────────────────────────────── */
    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
    }
    .error-state h2 {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      color: var(--text);
      margin-bottom: 0.75rem;
    }
    .error-state p {
      font-size: 1rem;
      color: var(--text-2);
      margin-bottom: 1.5rem;
    }
    .error-state a {
      color: var(--accent);
      font-weight: 600;
    }

    /* ─── Mobile pill bar ───────────────────────────────────────────── */
    .mobile-nav {
      display: none;
      overflow-x: auto;
      padding: 0.75rem 1rem;
      gap: 0.375rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
      -ms-overflow-style: none;
      -webkit-mask-image: linear-gradient(to right, transparent, black 1rem, black calc(100% - 2rem), transparent);
      mask-image: linear-gradient(to right, transparent, black 1rem, black calc(100% - 2rem), transparent);
    }
    .mobile-nav::-webkit-scrollbar { display: none; }

    .mobile-pill {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.25rem 0.75rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-2);
      white-space: nowrap;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .mobile-pill:hover {
      background: var(--accent-light);
      color: var(--accent);
      text-decoration: none;
    }
    .mobile-pill.active {
      background: var(--accent-light);
      color: var(--accent);
      border-color: var(--accent);
    }
    .mobile-pill-num {
      font-family: var(--font-mono);
      font-size: 0.625rem;
      color: var(--text-3);
    }
    .mobile-pill.active .mobile-pill-num {
      color: var(--accent);
    }

    /* ─── Responsive ────────────────────────────────────────────────── */
    @media (max-width: 820px) {
      .sidebar { display: none; }
      .mobile-nav { display: flex; }
      .layout { flex-direction: column; }
      .main { padding: 1.5rem 1.25rem 3rem; }
      .impact-columns { grid-template-columns: 1fr; }
      .bg-item { grid-template-columns: 1fr; gap: 0.25rem; }
      .decode-item { grid-template-columns: 1fr; }
      .decode-arrow { display: none; }
      .decode-phrase { border-bottom: 1px solid var(--amber-border); }
      .paper-title { font-size: 1.75rem; }
    }

    @media (max-width: 520px) {
      .main { padding: 1rem 1rem 2.5rem; }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar" role="navigation" aria-label="Site navigation">
  <a class="navbar-back" href="index.html">← Library</a>
  <a class="navbar-logo" href="index.html">Paper<strong>Lens</strong></a>
  <div class="navbar-search">
    <svg class="navbar-search-icon" width="13" height="13" viewBox="0 0 15 15" fill="none" aria-hidden="true">
      <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
      <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input type="search" id="search-input" placeholder="Search papers…" autocomplete="off" spellcheck="false" aria-label="Search papers" aria-autocomplete="list" aria-controls="search-dropdown">
    <div class="search-dropdown" id="search-dropdown" role="listbox"></div>
  </div>
</nav>

<!-- Mobile pill nav (populated by JS) -->
<div class="mobile-nav" id="mobilePillBar" aria-label="Chapter navigation"></div>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar (populated by JS) -->
  <aside class="sidebar" aria-label="Chapter navigation">
    <div class="sidebar-label">Chapters</div>
    <ul class="chapter-nav" id="chapterNav"></ul>
    <div class="progress-section">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="progress-label" id="progressLabel">0 of 7 sections</div>
    </div>
  </aside>

  <!-- Main content (populated by JS) -->
  <main class="main" id="mainContent">
    <div class="content-inner" id="contentInner">
      <div class="error-state" id="loadingState">
        <p style="color:var(--text-3)">Loading paper...</p>
      </div>
    </div>
  </main>

</div>

<script>
(function () {
  'use strict';

  /* ── Helpers ──────────────────────────────────────────────────── */

  function el(tag, attrs, ...children) {
    const node = document.createElement(tag);
    if (attrs) {
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'class') node.className = v;
        else if (k === 'html') node.innerHTML = v;
        else node.setAttribute(k, v);
      }
    }
    for (const child of children) {
      if (child == null) continue;
      if (typeof child === 'string') node.appendChild(document.createTextNode(child));
      else node.appendChild(child);
    }
    return node;
  }

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  /* ── Jargon Highlighting ──────────────────────────────────────── */

  /**
   * Build a sorted (longest-first) list of glossary entries.
   * Returns a function: applyJargon(text, usedSet) -> HTML string.
   * usedSet is a Set that tracks which terms have been seen in the current section.
   */
  function buildJargonHighlighter(glossary) {
    if (!glossary || !glossary.length) return (t) => esc(t);

    // Sort longest first to prevent partial matches
    const entries = glossary.slice().sort((a, b) => b.term.length - a.term.length);

    return function applyJargon(text, usedSet) {
      if (!text) return '';

      // Escape the raw text first then work on it so our placeholders don't
      // get double-escaped. We operate on the escaped form.
      const escaped = esc(text);

      // Build a combined regex from all terms
      // We'll do a manual scan so we can honour first-occurrence-per-section
      const result = [];
      let i = 0;
      const lower = escaped.toLowerCase();

      while (i < escaped.length) {
        let matched = false;
        for (const entry of entries) {
          const term = entry.term;
          const termLower = term.toLowerCase();
          if (lower.startsWith(termLower, i)) {
            const original = escaped.slice(i, i + term.length);
            if (!usedSet.has(termLower)) {
              usedSet.add(termLower);
              const def = esc(entry.definition);
              result.push(`<mark class="jt" title="${def}">${original}</mark>`);
            } else {
              result.push(original);
            }
            i += term.length;
            matched = true;
            break;
          }
        }
        if (!matched) {
          result.push(escaped[i]);
          i++;
        }
      }
      return result.join('');
    };
  }

  /* ── Section Builders ─────────────────────────────────────────── */

  const CHAPTERS = [
    { id: 'sec-summary',    num: '01', label: 'Summary' },
    { id: 'sec-background', num: '02', label: 'Background' },
    { id: 'sec-abstract',   num: '03', label: 'Abstract Decoded' },
    { id: 'sec-impact',     num: '04', label: 'Real-World Impact' },
    { id: 'sec-breakdown',  num: '05', label: 'Breakdown' },
    { id: 'sec-qna',        num: '06', label: 'Q&A' },
    { id: 'sec-refs',       num: '07', label: 'References' },
  ];

  function buildPaperHeader(paper) {
    const authors = paper.authors || [];
    const authorsStr = authors.length > 3
      ? authors.slice(0, 3).join(', ') + ' et al.'
      : authors.join(', ');

    const header = el('header', { class: 'paper-header' });
    header.appendChild(el('h1', { class: 'paper-title' }, paper.title));

    if (authorsStr) {
      header.appendChild(el('div', { class: 'paper-authors' }, authorsStr));
    }

    // Year, source, tags, and read-original all on one row
    const metaRow = el('div', { class: 'paper-meta-row' });
    if (paper.year) metaRow.appendChild(el('span', { class: 'paper-meta-item' }, String(paper.year)));
    if (paper.source) metaRow.appendChild(el('span', { class: 'paper-meta-item paper-source' }, paper.source));
    for (const t of (paper.tags || [])) {
      metaRow.appendChild(el('span', { class: 'paper-tag' }, t));
    }
    if (paper.originalUrl) {
      const btn = el('a', {
        class: 'read-original-btn',
        href: paper.originalUrl,
        target: '_blank',
        rel: 'noopener noreferrer'
      }, 'Read Original \u2197');
      metaRow.appendChild(btn);
    }
    header.appendChild(metaRow);

    return header;
  }

  function buildSummarySection(paper, applyJargon) {
    const section = el('section', { class: 'paper-section', id: 'sec-summary' });
    const usedSet = new Set();

    section.appendChild(el('h2', { class: 'section-heading', html: '<span class="sec-num">01 ·</span>Summary' }));

    const callout = el('div', { class: 'summary-callout' });
    callout.appendChild(el('div', { class: 'summary-callout-label' }, '\uD83D\uDCD6 Summary'));
    const p = el('p', { html: applyJargon(paper.summary || '', usedSet) });
    callout.appendChild(p);
    section.appendChild(callout);

    return section;
  }

  function buildBackgroundSection(paper, applyJargon) {
    const section = el('section', { class: 'paper-section', id: 'sec-background' });
    const bg = paper.background || {};
    const ctx = paper.context || {};

    section.appendChild(el('h2', { class: 'section-heading', html: '<span class="sec-num">02 ·</span>Background &amp; Context' }));

    // Field as an inline strip (not a card)
    if (bg.field) {
      const strip = el('div', { class: 'bg-field-strip' });
      strip.appendChild(el('span', { class: 'bg-field-label' }, 'Field'));
      strip.appendChild(document.createTextNode(bg.field));
      section.appendChild(strip);
    }

    // Narrative items: label on left, text on right
    const narrative = el('div', { class: 'bg-narrative' });
    const bgItems = [
      bg.priorWork    && { label: 'Prior Work',    text: bg.priorWork },
      bg.gap          && { label: 'Open Question', text: bg.gap },
      bg.whyItMatters && { label: 'Why It Matters', text: bg.whyItMatters },
      ctx.yearContext && { label: 'The Moment',    text: ctx.yearContext },
    ].filter(Boolean);

    for (const item of bgItems) {
      const usedSet = new Set();
      const row = el('div', { class: 'bg-item' });
      row.appendChild(el('div', { class: 'bg-item-label' }, item.label));
      row.appendChild(el('p', { class: 'bg-item-text', html: applyJargon(item.text, usedSet) }));
      narrative.appendChild(row);
    }
    section.appendChild(narrative);

    // Research landscape as a "Did you know" callout
    if (ctx.researchLandscape) {
      const usedSet = new Set();
      const dyk = el('div', { class: 'dyk-callout' });
      dyk.appendChild(el('div', { class: 'dyk-callout-label' }, 'Research Landscape'));
      dyk.appendChild(el('p', { html: applyJargon(ctx.researchLandscape, usedSet) }));
      section.appendChild(dyk);
    }

    return section;
  }

  function buildAbstractSection(paper, applyJargon) {
    const section = el('section', { class: 'paper-section', id: 'sec-abstract' });
    const ab = paper.abstractBreakdown || {};
    const usedSet = new Set();

    section.appendChild(el('h2', { class: 'section-heading', html: '<span class="sec-num">03 ·</span>Abstract Decoded' }));

    if (ab.original) {
      const quote = el('blockquote', { class: 'abstract-quote', html: applyJargon(ab.original, usedSet) });
      section.appendChild(quote);
    }

    const decoded = ab.decoded || [];
    if (decoded.length) {
      section.appendChild(el('div', { class: 'decode-label' }, 'What the jargon actually means'));
      const grid = el('div', { class: 'decode-grid' });
      for (const item of decoded) {
        const row = el('div', { class: 'decode-item' });
        row.appendChild(el('div', { class: 'decode-phrase' }, item.phrase));
        row.appendChild(el('div', { class: 'decode-arrow' }, '→'));
        row.appendChild(el('div', { class: 'decode-meaning' }, item.meaning));
        grid.appendChild(row);
      }
      section.appendChild(grid);
    }

    return section;
  }

  function buildImpactSection(paper, applyJargon) {
    const section = el('section', { class: 'paper-section', id: 'sec-impact' });
    const impact = paper.realWorldImpact || {};

    section.appendChild(el('h2', { class: 'section-heading', html: '<span class="sec-num">04 ·</span>Before &amp; After' }));

    const columns = el('div', { class: 'impact-columns' });

    // Before column
    const beforeCol = el('div', { class: 'impact-col' });
    const beforeHdr = el('div', { class: 'impact-col-header before' }, 'BEFORE');
    beforeCol.appendChild(beforeHdr);
    for (const item of (impact.beforePaper || [])) {
      const usedSet = new Set();
      const card = el('div', { class: 'impact-card before-card' });
      const body = el('div', { class: 'impact-card-body' });
      body.appendChild(el('div', { class: 'impact-area' }, item.area));
      body.appendChild(el('p', { class: 'impact-desc', html: applyJargon(item.description, usedSet) }));
      if (item.example) {
        const exSet = new Set();
        body.appendChild(el('p', { class: 'impact-example', html: applyJargon(item.example, exSet) }));
      }
      card.appendChild(body);
      beforeCol.appendChild(card);
    }

    // After column
    const afterCol = el('div', { class: 'impact-col' });
    const afterHdr = el('div', { class: 'impact-col-header after' }, 'AFTER');
    afterCol.appendChild(afterHdr);
    for (const item of (impact.afterPaper || [])) {
      const usedSet = new Set();
      const card = el('div', { class: 'impact-card after-card' });
      const body = el('div', { class: 'impact-card-body' });
      body.appendChild(el('div', { class: 'impact-area' }, item.area));
      body.appendChild(el('p', { class: 'impact-desc', html: applyJargon(item.description, usedSet) }));
      if (item.example) {
        const exSet = new Set();
        body.appendChild(el('p', { class: 'impact-example', html: applyJargon(item.example, exSet) }));
      }
      card.appendChild(body);
      afterCol.appendChild(card);
    }

    columns.appendChild(beforeCol);
    columns.appendChild(afterCol);
    section.appendChild(columns);

    return section;
  }

  function buildBreakdownSection(paper, applyJargon) {
    const section = el('section', { class: 'paper-section', id: 'sec-breakdown' });

    section.appendChild(el('h2', { class: 'section-heading', html: '<span class="sec-num">05 ·</span>Piece by Piece' }));

    const list = el('div', { class: 'breakdown-list' });
    const sections = paper.sections || [];
    for (let i = 0; i < sections.length; i++) {
      const s = sections[i];
      const usedSet = new Set();
      const item = el('div', { class: 'breakdown-item' });
      item.appendChild(el('div', { class: 'breakdown-num' }, `SECTION ${i + 1}`));
      item.appendChild(el('h3', { class: 'breakdown-title' }, s.title));
      item.appendChild(el('p', { class: 'breakdown-text', html: applyJargon(s.simplified, usedSet) }));
      list.appendChild(item);
    }
    section.appendChild(list);

    return section;
  }

  function buildQnaSection(paper, applyJargon) {
    const section = el('section', { class: 'paper-section', id: 'sec-qna' });
    const qna = paper.qanda || {};

    section.appendChild(el('h2', { class: 'section-heading', html: '<span class="sec-num">06 ·</span>Q&amp;A' }));

    const tabs = el('div', { class: 'qna-tabs', role: 'tablist' });
    const panels = [];

    const levels = [
      { key: 'beginner', label: 'Beginner' },
      { key: 'intermediate', label: 'Intermediate' },
      { key: 'expert', label: 'Expert' },
    ];

    for (let li = 0; li < levels.length; li++) {
      const lev = levels[li];
      const isActive = li === 0;
      const tabBtn = el('button', {
        class: 'tab-btn' + (isActive ? ' active' : ''),
        role: 'tab',
        'aria-selected': isActive ? 'true' : 'false',
        'data-tab': lev.key,
      }, lev.label);
      tabs.appendChild(tabBtn);

      const panel = el('div', {
        class: 'tab-panel' + (isActive ? ' active' : ''),
        id: `tab-panel-${lev.key}`,
        role: 'tabpanel',
      });

      const accList = el('div', { class: 'accordion-list' });
      const items = qna[lev.key] || [];
      for (const item of items) {
        const usedSet = new Set();
        const acc = el('div', { class: 'accordion-item' });

        const trigger = el('button', { class: 'accordion-trigger' });
        trigger.appendChild(el('span', { class: 'accordion-q' }, item.question));
        trigger.appendChild(el('span', { class: 'accordion-arrow' }, '\u25B8'));
        acc.appendChild(trigger);

        const body = el('div', { class: 'accordion-body' });
        body.appendChild(el('div', { class: 'accordion-answer', html: applyJargon(item.answer, usedSet) }));
        acc.appendChild(body);

        // Accordion click handler
        trigger.addEventListener('click', () => {
          const isOpen = acc.classList.contains('open');
          // Close all in this panel
          accList.querySelectorAll('.accordion-item.open').forEach(o => o.classList.remove('open'));
          if (!isOpen) {
            acc.classList.add('open');
          }
        });

        accList.appendChild(acc);
      }
      panel.appendChild(accList);
      panels.push(panel);
    }

    section.appendChild(tabs);
    for (const p of panels) section.appendChild(p);

    // Tab switching
    tabs.addEventListener('click', (e) => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      const key = btn.dataset.tab;
      tabs.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === key);
        b.setAttribute('aria-selected', b.dataset.tab === key ? 'true' : 'false');
      });
      section.querySelectorAll('.tab-panel').forEach(p => {
        p.classList.toggle('active', p.id === `tab-panel-${key}`);
      });
    });

    return section;
  }

  function buildRefsSection(paper) {
    const section = el('section', { class: 'paper-section', id: 'sec-refs' });

    section.appendChild(el('h2', { class: 'section-heading', html: '<span class="sec-num">07 ·</span>Further Reading' }));

    const refs = paper.references || [];
    if (!refs.length) {
      section.appendChild(el('p', { style: 'color:var(--text-3);font-size:0.9rem' }, 'No references listed.'));
      return section;
    }

    // Group by type
    const TYPE_META = {
      video:   { icon: '\u25B6', bg: '#FEF2F2', label: 'Videos' },
      article: { icon: '\u270E', bg: '#EBF4FF', label: 'Articles' },
      paper:   { icon: '\uD83D\uDCC4', bg: '#F3EEFF', label: 'Papers' },
      course:  { icon: '\uD83C\uDF93', bg: '#FFF8E7', label: 'Courses' },
      book:    { icon: '\uD83D\uDCDA', bg: '#F0FDF4', label: 'Books' },
      tool:    { icon: '\uD83D\uDD27', bg: '#E8F8F8', label: 'Tools' },
    };

    const groups = {};
    for (const ref of refs) {
      const t = ref.type || 'other';
      if (!groups[t]) groups[t] = [];
      groups[t].push(ref);
    }

    const container = el('div', { class: 'refs-groups' });

    for (const [type, items] of Object.entries(groups)) {
      const meta = TYPE_META[type] || { icon: '\u2022', bg: '#F5F5F5', label: type };
      const group = el('div', { class: 'ref-group' });

      const hdr = el('div', { class: 'ref-group-header' });
      const left = el('div', { class: 'ref-group-left' });
      const iconEl = el('div', {
        class: 'ref-type-icon',
        style: `background:${meta.bg}`,
        'aria-hidden': 'true'
      }, meta.icon);
      left.appendChild(iconEl);
      left.appendChild(el('span', { class: 'ref-group-name' }, meta.label));
      left.appendChild(el('span', { class: 'ref-group-count' }, `(${items.length})`));
      hdr.appendChild(left);
      hdr.appendChild(el('span', { class: 'ref-group-arrow' }, '\u25BE'));
      group.appendChild(hdr);

      const body = el('div', { class: 'ref-group-body' });
      const cards = el('div', { class: 'ref-cards' });
      for (const ref of items) {
        const card = el('div', { class: 'ref-card' });
        const titleEl = el('div', { class: 'ref-card-title' });
        if (ref.url) {
          titleEl.appendChild(el('a', { href: ref.url, target: '_blank', rel: 'noopener noreferrer' }, ref.title));
        } else {
          titleEl.appendChild(document.createTextNode(ref.title));
        }
        card.appendChild(titleEl);

        const metaRow = el('div', { class: 'ref-card-meta' });
        if (ref.level) {
          const levelClass = `ref-level ref-level-${ref.level || 'beginner'}`;
          metaRow.appendChild(el('span', { class: levelClass }, ref.level));
        }
        if (ref.source) {
          metaRow.appendChild(el('span', { class: 'ref-source' }, ref.source));
        }
        card.appendChild(metaRow);

        if (ref.description) {
          card.appendChild(el('p', { class: 'ref-desc' }, ref.description));
        }
        cards.appendChild(card);
      }
      body.appendChild(cards);
      group.appendChild(body);

      // Toggle open/close
      hdr.addEventListener('click', () => {
        group.classList.toggle('open');
      });

      container.appendChild(group);
    }

    // Open first group by default
    const firstGroup = container.querySelector('.ref-group');
    if (firstGroup) firstGroup.classList.add('open');

    section.appendChild(container);
    return section;
  }

  /* ── Sidebar & Progress ───────────────────────────────────────── */

  function buildSidebar() {
    const nav = document.getElementById('chapterNav');
    if (!nav) return;
    nav.innerHTML = '';
    for (const ch of CHAPTERS) {
      const li = el('li', { class: 'chapter-nav-item', 'data-chapter': ch.id });
      const a = el('a', { href: `#${ch.id}` });
      a.appendChild(el('span', { class: 'chapter-num' }, ch.num));
      a.appendChild(document.createTextNode(ch.label));
      li.appendChild(a);
      nav.appendChild(li);
    }
  }

  function buildMobilePillBar() {
    const bar = document.getElementById('mobilePillBar');
    if (!bar) return;
    bar.innerHTML = '';
    for (const ch of CHAPTERS) {
      const pill = el('a', {
        class: 'mobile-pill',
        href: `#${ch.id}`,
        'data-chapter': ch.id,
      });
      pill.appendChild(el('span', { class: 'mobile-pill-num' }, ch.num));
      pill.appendChild(document.createTextNode(ch.label));
      bar.appendChild(pill);
    }
  }

  function setupScrollTracking() {
    const sectionIds = CHAPTERS.map(c => c.id);
    let visibleSet = new Set();

    const observer = new IntersectionObserver((entries) => {
      for (const entry of entries) {
        if (entry.isIntersecting) visibleSet.add(entry.target.id);
        else visibleSet.delete(entry.target.id);
      }

      // Find the topmost visible section
      let activeId = null;
      for (const id of sectionIds) {
        if (visibleSet.has(id)) { activeId = id; break; }
      }
      if (!activeId && visibleSet.size > 0) {
        activeId = [...visibleSet][0];
      }

      // Update sidebar
      document.querySelectorAll('.chapter-nav-item').forEach(li => {
        li.classList.toggle('active', li.dataset.chapter === activeId);
      });
      // Update mobile pills
      document.querySelectorAll('.mobile-pill').forEach(pill => {
        pill.classList.toggle('active', pill.dataset.chapter === activeId);
      });

      // Update progress
      const seen = sectionIds.filter(id => {
        // A section is "seen" if it's currently visible or has scrolled past
        const el = document.getElementById(id);
        if (!el) return false;
        return el.getBoundingClientRect().top < window.innerHeight * 0.7;
      });
      const count = Math.max(seen.length, visibleSet.size > 0 ? 1 : 0);
      const actual = seen.length;
      const total = sectionIds.length;
      const pct = total ? (actual / total) * 100 : 0;
      const fill = document.getElementById('progressFill');
      const label = document.getElementById('progressLabel');
      if (fill) fill.style.width = pct + '%';
      if (label) label.textContent = `${actual} of ${total} sections`;
    }, {
      rootMargin: '-10% 0px -50% 0px',
      threshold: 0,
    });

    for (const id of sectionIds) {
      const el = document.getElementById(id);
      if (el) observer.observe(el);
    }
  }

  /* ── Main render ──────────────────────────────────────────────── */

  function renderPaper(paper) {
    document.title = `${paper.title} — PaperLens`;

    const applyJargon = buildJargonHighlighter(paper.glossary);

    buildSidebar();
    buildMobilePillBar();

    const inner = document.getElementById('contentInner');
    inner.innerHTML = '';

    inner.appendChild(buildPaperHeader(paper));
    inner.appendChild(buildSummarySection(paper, applyJargon));
    inner.appendChild(buildBackgroundSection(paper, applyJargon));
    inner.appendChild(buildAbstractSection(paper, applyJargon));
    inner.appendChild(buildImpactSection(paper, applyJargon));
    inner.appendChild(buildBreakdownSection(paper, applyJargon));
    inner.appendChild(buildQnaSection(paper, applyJargon));
    inner.appendChild(buildRefsSection(paper));

    // Wait for DOM to settle then track scroll
    requestAnimationFrame(() => {
      setupScrollTracking();
    });
  }

  function showError(msg) {
    const inner = document.getElementById('contentInner');
    inner.innerHTML = '';
    const err = el('div', { class: 'error-state' });
    err.appendChild(el('h2', {}, 'Paper not found'));
    err.appendChild(el('p', {}, msg || 'The requested paper could not be loaded.'));
    err.appendChild(el('a', { href: 'index.html' }, '\u2190 Back to Library'));
    inner.appendChild(err);
  }

  /* ── Navbar Search ───────────────────────────────────────────── */

  (function() {
    const inp = document.getElementById('search-input');
    const drop = document.getElementById('search-dropdown');
    if (!inp || !drop) return;

    let allPapers = [];
    let debounce = null;
    let focusIdx = -1;

    // Load paper index lazily on first focus
    let loaded = false;
    async function ensureLoaded() {
      if (loaded) return;
      loaded = true;
      try {
        const res = await fetch('papers/index.json');
        if (!res.ok) return;
        const ids = await res.json();
        const results = await Promise.allSettled(
          (Array.isArray(ids) ? ids : []).map(id => fetch('papers/' + encodeURIComponent(id) + '.json').then(r => r.ok ? r.json() : null))
        );
        allPapers = results.map(r => r.status === 'fulfilled' ? r.value : null).filter(Boolean);
      } catch(e) { /* silent */ }
    }

    function items() { return drop.querySelectorAll('.search-dropdown-item'); }

    function setFocus(i) {
      items().forEach((el, j) => el.classList.toggle('focused', j === i));
      focusIdx = i;
    }

    function open(q) {
      if (!q) { close(); return; }
      const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
      const matches = allPapers.filter(function(p) {
        const hay = [p.title || '', (p.authors || []).join(' '), (p.tags || []).join(' ')].join(' ').toLowerCase();
        return terms.every(function(t) { return hay.includes(t); });
      }).slice(0, 6);
      drop.textContent = '';
      if (!matches.length) {
        const empty = document.createElement('div');
        empty.className = 'search-dropdown-empty';
        empty.textContent = 'No papers found';
        drop.appendChild(empty);
      } else {
        matches.forEach(function(p) {
          const a = document.createElement('a');
          a.className = 'search-dropdown-item';
          a.href = 'paper.html#' + encodeURIComponent(p.id);
          a.setAttribute('role', 'option');
          const title = document.createElement('span');
          title.className = 'search-dropdown-title';
          title.textContent = p.title || 'Untitled';
          a.appendChild(title);
          const authors = (p.authors || []).slice(0, 2).join(', ') + ((p.authors || []).length > 2 ? ' et al.' : '');
          const metaParts = [authors, p.year].filter(Boolean);
          if (metaParts.length) {
            const meta = document.createElement('span');
            meta.className = 'search-dropdown-meta';
            meta.textContent = metaParts.join(' · ');
            a.appendChild(meta);
          }
          drop.appendChild(a);
        });
      }
      focusIdx = -1;
      drop.classList.add('open');
    }

    function close() {
      drop.classList.remove('open');
      focusIdx = -1;
    }

    inp.addEventListener('focus', async function() {
      await ensureLoaded();
      if (inp.value.trim()) open(inp.value.trim());
    });

    inp.addEventListener('input', function(e) {
      clearTimeout(debounce);
      const q = e.target.value.trim();
      debounce = setTimeout(function() { open(q); }, 180);
    });

    inp.addEventListener('keydown', function(e) {
      if (!drop.classList.contains('open')) return;
      const its = items();
      if (e.key === 'ArrowDown') { e.preventDefault(); setFocus(Math.min(focusIdx + 1, its.length - 1)); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); setFocus(Math.max(focusIdx - 1, 0)); }
      else if (e.key === 'Enter' && focusIdx >= 0) { e.preventDefault(); if (its[focusIdx]) its[focusIdx].click(); }
      else if (e.key === 'Escape') { close(); inp.blur(); }
    });

    document.addEventListener('click', function(e) {
      if (!inp.closest('.navbar-search').contains(e.target)) close();
    });

    // Cmd+K / Ctrl+K to focus search
    document.addEventListener('keydown', function(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        inp.focus();
        inp.select();
      }
    });
  })();

  /* ── Boot ─────────────────────────────────────────────────────── */

  // Support both ?id=slug (direct HTTP) and #slug (clean URL / serve)
  const params = new URLSearchParams(window.location.search);
  const paperId = params.get('id') || (window.location.hash && window.location.hash.slice(1)) || null;

  if (!paperId) {
    showError('No paper ID specified. Use paper.html#paper-slug in the URL.');
  } else {
    fetch(`papers/${encodeURIComponent(paperId)}.json`)
      .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      })
      .then(data => renderPaper(data))
      .catch(() => showError(`Could not load paper "${paperId}". Make sure papers/${paperId}.json exists.`));
  }

})();
</script>
</body>
</html>
